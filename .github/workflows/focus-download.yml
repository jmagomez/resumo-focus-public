name: Download Boletim Focus

on:
  schedule:
    # Toda segunda-feira às 9h15 BRT (= 12h15 UTC)
    - cron: "15 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Baixar PDF do Focus
        run: python src/baixar_focus.py

      - name: Extrair texto do PDF
        run: python src/extrair_texto.py

      # O .txt precisa ser commitado: é ele que a rotina agendada do agente
      # lê (ver routine-prompt.md, Passo 1). Sem o .txt no repositório, a
      # extração era descartada e a rotina dependia de arquivo inexistente.
      - name: Commitar arquivos gerados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/focus_*.pdf data/focus_*.txt
          git diff --staged --quiet || git commit -m "feat: boletim focus $(date +%Y-%m-%d)"
          git push

      - name: Notifica falha por e-mail
        if: failure()
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.FOCUS_SMTP_USER }}
          password: ${{ secrets.FOCUS_SMTP_APP_PASSWORD }}
          to: ${{ secrets.FOCUS_EMAIL_DEST }}
          from: Resumo Focus <${{ secrets.FOCUS_SMTP_USER }}>
          subject: "⚠️ Download do Boletim Focus falhou (run ${{ github.run_number }})"
          body: |
            O workflow de download/extração do Boletim Focus falhou.
            A rotina de resumo de segunda-feira pode não encontrar o .txt novo.

            Log completo: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
